name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Fairchain? We'd love to hear it. Please describe the problem
        you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: textarea
    id: bitcoin_parity
    attributes:
      label: Bitcoin Core Parity
      description: |
        Does Bitcoin Core have an equivalent feature? If so, how does it work there?
        If this deviates from Bitcoin Core, explain why it makes sense for Fairchain.
